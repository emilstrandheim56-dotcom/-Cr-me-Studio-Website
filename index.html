<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Food & Shop Website</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f3f4f6;
}

header {
  background: #111;
  color: white;
  padding: 15px;
  text-align: center;
}

nav {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  background: #222;
  padding: 10px;
}

nav button {
  background: #444;
  color: white;
  border: none;
  padding: 8px 12px;
  cursor: pointer;
  border-radius: 6px;
}

nav button:hover {
  background: #666;
}

.page {
  display: none;
  padding: 20px;
}

.active {
  display: block;
}

/* Cards */
.card {
  background: white;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* Buttons */
.btn {
  background: #28a745;
  color: white;
  border: none;
  padding: 8px;
  border-radius: 6px;
  cursor: pointer;
}

.btn:hover {
  background: #218838;
}

/* Layout */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 10px;
}

/* Inputs */
input, select, textarea {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

/* Cart */
.cart-item {
  display: flex;
  justify-content: space-between;
  margin: 5px 0;
}
</style>
</head>

<body>

<header>
  <h1>Food & Shop Website</h1>
</header>

<nav>
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('shop')">Shop</button>
  <button onclick="showPage('sessions')">Sessions</button>
  <button onclick="showPage('recipes')">Recipes</button>
  <button onclick="showPage('cart')">Cart</button>
  <button onclick="showPage('booking')">Booking</button>
</nav>

<!-- HOME -->
<div id="home" class="page active">
  <h2>Welcome</h2>
  <div class="card">
    <p>This is your food & shop platform with recipes, sessions, cart, and booking.</p>
  </div>
</div>

<!-- SHOP -->
<div id="shop" class="page">
  <h2>Shop</h2>

  <div class="grid">
    <div class="card">
      <h3>Product A</h3>
      <p>$10</p>
      <button class="btn" onclick="addToCart('Product A', 10)">Add</button>
    </div>

    <div class="card">
      <h3>Product B</h3>
      <p>$20</p>
      <button class="btn" onclick="addToCart('Product B', 20)">Add</button>
    </div>
  </div>
</div>

<!-- SESSIONS -->
<div id="sessions" class="page">
  <h2>Sessions</h2>

  <div class="card">
    <h3>Cooking Session 1</h3>
    <p>Learn pasta making</p>
  </div>

  <div class="card">
    <h3>Cooking Session 2</h3>
    <p>Learn baking basics</p>
  </div>
</div>

<!-- RECIPES -->
<div id="recipes" class="page">
  <h2>Recipes</h2>

  <select onchange="filterRecipes(this.value)">
    <option value="all">All</option>
    <option value="fast">Fast</option>
    <option value="healthy">Healthy</option>
    <option value="dessert">Dessert</option>
  </select>

  <div id="recipeList"></div>
</div>

<!-- RECIPE DETAIL -->
<div id="recipeDetail" class="page">
  <h2>Recipe Detail</h2>
  <div id="recipeContent"></div>
  <button class="btn" onclick="showPage('recipes')">Back</button>
</div>

<!-- CART -->
<div id="cart" class="page">
  <h2>Cart</h2>
  <div id="cartItems"></div>
  <h3>Total: $<span id="total">0</span></h3>
  <button class="btn" onclick="clearCart()">Clear Cart</button>
</div>

<!-- BOOKING -->
<div id="booking" class="page">
  <h2>Booking Form</h2>

  <form onsubmit="book(event)">
    <input type="text" id="name" placeholder="Name" required />
    <input type="email" id="email" placeholder="Email" required />
    <input type="date" id="date" required />
    <textarea id="notes" placeholder="Notes"></textarea>
    <button class="btn" type="submit">Submit</button>
  </form>

  <p id="msg"></p>
</div>

<script>
/* ================= NAVIGATION ================= */
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
}

/* ================= CART ================= */
let cart = [];

function addToCart(name, price) {
  cart.push({ name, price });
  renderCart();
}

function renderCart() {
  const cartItems = document.getElementById("cartItems");
  const totalEl = document.getElementById("total");

  cartItems.innerHTML = "";
  let total = 0;

  cart.forEach((item, i) => {
    total += item.price;

    cartItems.innerHTML += `
      <div class="cart-item">
        <span>${item.name} - $${item.price}</span>
        <button onclick="removeItem(${i})">X</button>
      </div>
    `;
  });

  totalEl.textContent = total;
}

function removeItem(i) {
  cart.splice(i, 1);
  renderCart();
}

function clearCart() {
  cart = [];
  renderCart();
}

/* ================= BOOKING ================= */
function book(e) {
  e.preventDefault();
  const name = document.getElementById("name").value;

  document.getElementById("msg").innerText =
    "Booking confirmed for " + name;

  e.target.reset();
}

/* ================= RECIPES ================= */
const recipes = [
  { id: 1, name: "Pasta", type: "fast", desc: "Quick pasta recipe" },
  { id: 2, name: "Salad", type: "healthy", desc: "Fresh salad" },
  { id: 3, name: "Cake", type: "dessert", desc: "Chocolate cake" }
];

function loadRecipes(list = recipes) {
  const div = document.getElementById("recipeList");
  div.innerHTML = "";

  list.forEach(r => {
    div.innerHTML += `
      <div class="card">
        <h3>${r.name}</h3>
        <p>${r.type}</p>
        <button class="btn" onclick="viewRecipe(${r.id})">View</button>
      </div>
    `;
  });
}

function filterRecipes(type) {
  if (type === "all") loadRecipes(recipes);
  else loadRecipes(recipes.filter(r => r.type === type));
}

function viewRecipe(id) {
  const recipe = recipes.find(r => r.id === id);

  document.getElementById("recipeContent").innerHTML = `
    <div class="card">
      <h3>${recipe.name}</h3>
      <p>Type: ${recipe.type}</p>
      <p>${recipe.desc}</p>
    </div>
  `;

  showPage("recipeDetail");
}

/* INIT */
loadRecipes();
renderCart();
</script>

</body>
</html>
