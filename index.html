<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shop + Cart + Booking (Single Page)</title>

<style>
/* =======================
   GLOBAL STYLES
======================= */
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #eef0f3;
}

header {
  background: #111;
  color: white;
  padding: 15px;
  text-align: center;
}

/* =======================
   LAYOUT
======================= */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 15px;
  padding: 20px;
}

/* Responsive */
@media (max-width: 900px) {
  .container {
    grid-template-columns: 1fr;
  }
}

/* =======================
   BOX SECTIONS
======================= */
.box {
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* =======================
   PRODUCT STYLE
======================= */
.product {
  border: 1px solid #ddd;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
}

.product h3 {
  margin: 0;
}

button {
  background: #28a745;
  border: none;
  color: white;
  padding: 8px;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #218838;
}

/* =======================
   CART
======================= */
.cart-item {
  display: flex;
  justify-content: space-between;
  margin: 6px 0;
  padding: 6px;
  border-bottom: 1px solid #eee;
}

.remove {
  background: red;
  padding: 4px 8px;
  border-radius: 5px;
}

/* =======================
   FORM
======================= */
input, textarea {
  width: 100%;
  padding: 8px;
  margin-top: 6px;
  margin-bottom: 10px;
  border: 1px solid #ccc;
  border-radius: 6px;
}

.total {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<header>
  <h1>Shop + Cart + Booking (All-in-One Page)</h1>
</header>

<div class="container">

  <!-- ================= PRODUCTS ================= -->
  <div class="box">
    <h2>Products</h2>

    <div class="product">
      <h3>Product A</h3>
      <p>$10</p>
      <button onclick="addToCart('Product A', 10)">Add</button>
    </div>

    <div class="product">
      <h3>Product B</h3>
      <p>$20</p>
      <button onclick="addToCart('Product B', 20)">Add</button>
    </div>

    <div class="product">
      <h3>Product C</h3>
      <p>$30</p>
      <button onclick="addToCart('Product C', 30)">Add</button>
    </div>
  </div>

  <!-- ================= CART ================= -->
  <div class="box">
    <h2>Cart</h2>

    <div id="cart"></div>

    <div class="total">
      Total: $<span id="total">0</span>
    </div>

    <br>
    <button onclick="clearCart()">Clear Cart</button>
  </div>

  <!-- ================= BOOKING ================= -->
  <div class="box">
    <h2>Booking Form</h2>

    <form onsubmit="book(event)">
      <label>Name</label>
      <input type="text" id="name" required>

      <label>Email</label>
      <input type="email" id="email" required>

      <label>Date</label>
      <input type="date" id="date" required>

      <label>Notes</label>
      <textarea id="notes"></textarea>

      <button type="submit">Confirm Booking</button>
    </form>

    <p id="msg"></p>
  </div>

</div>

<script>
let cart = [];

function addToCart(name, price) {
  cart.push({ name, price });
  renderCart();
}

function renderCart() {
  const cartDiv = document.getElementById("cart");
  const totalEl = document.getElementById("total");

  cartDiv.innerHTML = "";
  let total = 0;

  cart.forEach((item, i) => {
    total += item.price;

    cartDiv.innerHTML += `
      <div class="cart-item">
        <span>${item.name} - $${item.price}</span>
        <button class="remove" onclick="removeItem(${i})">X</button>
      </div>
    `;
  });

  totalEl.textContent = total;
}

function removeItem(index) {
  cart.splice(index, 1);
  renderCart();
}

function clearCart() {
  cart = [];
  renderCart();
}

function book(e) {
  e.preventDefault();

  const name = document.getElementById("name").value;

  document.getElementById("msg").innerText =
    `Booking confirmed for ${name}!`;

  document.querySelector("form").reset();
}
</script>

</body>
</html>
